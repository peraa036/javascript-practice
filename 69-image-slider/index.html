<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slider">
        <div class="slides">
            <img class="slide" src="images/image1.jpg" alt="image#1" width=400px>
            <img class="slide" src="images/image2.jpg" alt="image#2" width=400px>
            <img class="slide" src="images/image3.jpg" alt="image#3" width=400px>
        </div>
        <button class="prev" onclick="prevSlide()"><</button>
        <button class="next" onclick="nextSlide()">></button>
    </div>
    <script src="index.js"></script>
</body>
</html>
